
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Landing Page Saya</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(120deg, #4e54c8, #8f94fb);
            color: white;
            text-align: center;
        }
        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        button {
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            background: #fff;
            color: #4e54c8;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #ddd;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Selamat Datang 🚀</h1>
        <p>Ini landing page pertama saya di GitHub Pages</p>
        <button>Hubungi Saya</button>
    </div>
</body>
</html>
